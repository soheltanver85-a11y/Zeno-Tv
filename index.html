<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeno TV - TV Edition</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root { --accent: #ff0000; --bg: #050505; --card: #1a1a1a; --blue: #0088ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }

        /* প্লেয়ার সেকশন */
        #player-wrapper { 
            height: 45vh; width: 100%; background: #000; position: fixed; top: 0; left: 0; z-index: 4000; 
            display: flex; justify-content: center; align-items: center; border-bottom: 3px solid #333;
        }
        .video-js { width: 100% !important; height: 100% !important; }
        
        /* UI লেআউট */
        #ui-overlay { margin-top: 45vh; height: 55vh; display: flex; flex-direction: column; background: var(--bg); }
        
        /* কন্ট্রোল বার */
        .tabs-container { 
            flex-shrink: 0; display: flex; align-items: center; gap: 15px; 
            padding: 15px 25px; background: #0a0a0a; z-index: 3500;
            border-bottom: 3px solid var(--blue); overflow-x: auto;
        }

        .tab, .apk-btn, .refresh-btn, .custom-fs-btn { 
            padding: 16px 30px; border-radius: 12px; cursor: pointer; background: #222; 
            color: #fff; font-weight: bold; font-size: 18px; border: 3px solid transparent; outline: none;
            white-space: nowrap; transition: 0.2s;
        }

        #search-input {
            flex-grow: 1; min-width: 250px; padding: 16px 20px; border-radius: 12px; 
            border: 3px solid #333; background: #111; color: #fff; font-size: 18px; 
            outline: none;
        }

        .tab:focus, .card:focus, .refresh-btn:focus, .custom-fs-btn:focus, .apk-btn:focus, #search-input:focus { 
            border-color: #fff !important; transform: scale(1.05); background: var(--blue); color: white;
        }

        /* বড় লোগো গ্রিড (TV Optimized) */
        #scroll-content { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; padding: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        
        .card { background: var(--card); border-radius: 18px; cursor: pointer; border: 3px solid #333; position: relative; overflow: hidden; transition: 0.2s; }
        
        /* লোগো বক্স বড় করা হয়েছে */
        .logo-box { height: 110px; display: flex; align-items: center; justify-content: center; background: #fff; padding: 10px; pointer-events: none; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .name { padding: 15px; font-size: 16px; font-weight: bold; text-align: center; color: #fff; pointer-events: none; }
        .ch-index { position: absolute; top: 10px; left: 10px; background: var(--blue); color: white; font-size: 14px; font-weight: bold; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 5; border: 2px solid white; }

        /* OSD নম্বর */
        #osd-number { 
            position: fixed; top: 50px; right: 50px; background: rgba(255, 0, 0, 0.95); 
            color: white; font-size: 60px; font-weight: bold; padding: 20px 40px; 
            border-radius: 20px; display: none; z-index: 99999; border: 4px solid white;
        }
    </style>
</head>
<body>

<div id="osd-number">CH: --</div>

<div id="player-wrapper">
    <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
</div>

<div id="ui-overlay">
    <div class="tabs-container">
        <button class="tab" tabindex="0" onclick="showCategory('all')">সব চ্যানেল</button>
        <button class="refresh-btn" tabindex="0" onclick="forceRefresh()">🔄 আপডেট</button>
        <button class="custom-fs-btn" tabindex="0" onclick="goFullscreen()">📺 ফুলস্ক্রিন</button>
        <input type="text" id="search-input" placeholder="🔍 সার্চ..." tabindex="0">
    </div>

    <div id="scroll-content">
        <div id="channel-grid" class="grid"></div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const player = videojs('tv-player');
    const rawUrl = 'https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/refs/heads/main/Live-tv2';
    const m3uUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(rawUrl);

    let allChannels = [];

    // দ্রুত লোড করার জন্য ক্যাশ-ফার্স্ট ফাংশন
    async function init() {
        const cachedData = localStorage.getItem('zeno_cache');
        if (cachedData) {
            allChannels = JSON.parse(cachedData);
            renderGrid(allChannels);
        }
        fetchChannels(); 
    }

    async function fetchChannels() {
        try {
            const res = await fetch(m3uUrl + '&t=' + new Date().getTime());
            const data = await res.text();
            const lines = data.split('\n');
            let name = "", logo = "", newChannels = [];

            lines.forEach(line => {
                line = line.trim();
                if (line.includes('#EXTINF:')) {
                    name = line.split(',').pop().trim();
                    logo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || "";
                } else if (line.startsWith('http')) {
                    newChannels.push({ name: name || "Channel", url: line, logo });
                }
            });

            if (newChannels.length > 0) {
                const oldData = localStorage.getItem('zeno_cache');
                if (JSON.stringify(newChannels) !== oldData) {
                    allChannels = newChannels;
                    localStorage.setItem('zeno_cache', JSON.stringify(allChannels));
                    renderGrid(allChannels);
                }
            }
        } catch(e) { console.error(e); }
    }

    function renderGrid(list) {
        const grid = document.getElementById('channel-grid');
        grid.innerHTML = ''; 
        list.forEach((ch, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.tabIndex = 0;
            const originalIdx = index + 1;
            card.setAttribute('data-index', originalIdx);
            card.innerHTML = `
                <div class="ch-index">${originalIdx}</div>
                <div class="logo-box">
                    <img src="${ch.logo}" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=TV'">
                </div>
                <div class="name">${ch.name}</div>`;

            card.addEventListener('click', () => playChannel(ch, card));
            grid.appendChild(card);
        });
    }

    function playChannel(ch, cardElement) {
        player.src({ src: ch.url, type: 'application/x-mpegURL' });
        player.play().catch(()=>{});
        if(cardElement) cardElement.focus();
    }

    async function forceRefresh() {
        localStorage.removeItem('zeno_cache');
        location.reload();
    }

    document.getElementById('search-input').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase().trim();
        const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(term));
        renderGrid(filtered);
    });

    function goFullscreen() { player.isFullscreen() ? player.exitFullscreen() : player.requestFullscreen(); }
    function showCategory(type) { renderGrid(allChannels); }

    // টিভি রিমোট নম্বর সিস্টেম
    let numBuffer = "", numTimeout = null;
    function handleNumberKey(key) {
        if (document.activeElement === document.getElementById('search-input')) return;
        numBuffer += key;
        const osd = document.getElementById('osd-number');
        osd.innerText = "CH: " + numBuffer; 
        osd.style.display = 'block';
        clearTimeout(numTimeout);
        numTimeout = setTimeout(() => {
            const targetIdx = parseInt(numBuffer);
            const chData = allChannels[targetIdx - 1];
            if (chData) {
                const targetCard = document.querySelector(`.card[data-index="${targetIdx}"]`);
                playChannel(chData, targetCard);
                if(targetCard) targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            numBuffer = ""; 
            osd.style.display = 'none';
        }, 1200); 
    }

    window.addEventListener('keydown', (e) => { if (e.key >= '0' && e.key <= '9') handleNumberKey(e.key); });

    init();
</script>
</body>
</html>
