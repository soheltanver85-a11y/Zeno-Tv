<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeno TV - Turbo Speed Edition</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root { --accent: #ff0000; --bg: #050505; --card: #1a1a1a; --blue: #0088ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }

        /* প্লেয়ার সেকশন */
        #player-wrapper { 
            height: 45vh; width: 100%; background: #000; position: fixed; top: 0; left: 0; z-index: 4000; 
            display: flex; justify-content: center; align-items: center; border-bottom: 2px solid #333;
        }
        .video-js { width: 100% !important; height: 100% !important; }
        
        /* UI লেআউট */
        #ui-overlay { margin-top: 45vh; height: 55vh; display: flex; flex-direction: column; background: var(--bg); }
        
        .tabs-container { 
            flex-shrink: 0; display: flex; align-items: center; gap: 10px; 
            padding: 12px 15px; background: #0a0a0a; border-bottom: 2px solid var(--blue); overflow-x: auto;
        }

        .tab, .refresh-btn, .custom-fs-btn { 
            padding: 10px 18px; border-radius: 8px; cursor: pointer; background: #222; 
            color: #fff; font-weight: bold; font-size: 14px; border: none; outline: none; white-space: nowrap;
        }

        .custom-fs-btn { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; }

        /* চ্যানেল গ্রিড */
        #scroll-content { flex-grow: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        
        .card { background: var(--card); border-radius: 10px; cursor: pointer; border: 1px solid #333; position: relative; overflow: hidden; transition: 0.2s; }
        .card:focus { border-color: var(--accent); transform: scale(1.03); outline: none; }
        
        .logo-box { height: 80px; display: flex; align-items: center; justify-content: center; background: #111; padding: 5px; pointer-events: none; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .name { padding: 8px; font-size: 12px; font-weight: bold; text-align: center; color: #eee; pointer-events: none; }
        .ch-index { position: absolute; top: 5px; left: 5px; background: var(--blue); color: white; font-size: 10px; font-weight: bold; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        #osd-number { 
            position: fixed; top: 20px; right: 20px; background: var(--accent); 
            color: white; font-size: 35px; font-weight: bold; padding: 8px 20px; 
            border-radius: 8px; display: none; z-index: 99999;
        }
    </style>
</head>
<body>

<div id="osd-number">CH: --</div>

<div id="player-wrapper">
    <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
</div>

<div id="ui-overlay">
    <div class="tabs-container">
        <button class="tab">সব চ্যানেল</button>
        <button class="refresh-btn" onclick="forceRefresh()">🔄 রিফ্রেশ</button>
        <button class="custom-fs-btn" onclick="goFullscreen()">📺 ফুলস্ক্রিন</button>
    </div>

    <div id="scroll-content">
        <div id="channel-grid" class="grid"></div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const player = videojs('tv-player');
    const rawUrl = 'https://gitlab.com/soheltanver85/m3u-link/-/raw/main/playlist.m3u';
    let allChannels = [];

    // ১. শুরুতে দ্রুত যা জমানো আছে তাই দেখাবে
    function init() {
        const cachedData = localStorage.getItem('zeno_cache');
        if (cachedData) {
            allChannels = JSON.parse(cachedData);
            renderGrid(allChannels); // লোডিং লেখা ছাড়াই সাথে সাথে চ্যানেল চলে আসবে
        }
        
        // ব্যাকগ্রাউন্ডে ডাটা আপডেট করবে
        updateChannels();
        // প্রতি ২০ সেকেন্ড পর পর নিজে নিজে আপডেট খুঁজবে
        setInterval(updateChannels, 20000);
    }

    async function updateChannels() {
        try {
            const token = Date.now();
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rawUrl)}&v=${token}`;
            
            const res = await fetch(proxyUrl);
            const data = await res.text();
            
            if (!data || data.length < 50) return;

            const lines = data.split('\n');
            let name = "", logo = "";
            let newChannels = [];

            lines.forEach(line => {
                line = line.trim();
                if (line.includes('#EXTINF:')) {
                    const nameParts = line.split(',');
                    name = nameParts[nameParts.length - 1].trim();
                    logo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || "";
                } else if (line.startsWith('http')) {
                    newChannels.push({ name: name || "Channel", url: line, logo: logo });
                }
            });

            if (newChannels.length > 0) {
                const oldData = JSON.stringify(allChannels);
                const newData = JSON.stringify(newChannels);

                if (oldData !== newData) {
                    allChannels = newChannels;
                    localStorage.setItem('zeno_cache', newData);
                    renderGrid(allChannels);
                }
            }
        } catch (e) {
            console.log("Silent Update failed.");
        }
    }

    function renderGrid(list) {
        const grid = document.getElementById('channel-grid');
        grid.innerHTML = ''; 
        list.forEach((ch, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.tabIndex = 0;
            card.setAttribute('data-index', index + 1);
            card.innerHTML = `
                <div class="ch-index">${index + 1}</div>
                <div class="logo-box"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150?text=TV'"></div>
                <div class="name">${ch.name}</div>
            `;
            card.onclick = () => playChannel(ch, card);
            grid.appendChild(card);
        });
    }

    function playChannel(ch, card) {
        player.src({ src: ch.url, type: 'application/x-mpegURL' });
        player.play().catch(() => {});
        if(card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function forceRefresh() {
        localStorage.removeItem('zeno_cache');
        updateChannels();
    }

    function goFullscreen() {
        if (player.isFullscreen()) player.exitFullscreen();
        else player.requestFullscreen();
    }

    // রিমোট কন্ট্রোল লজিক (CH নম্বর)
    let numBuffer = "";
    let numTimeout = null;
    window.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') {
            numBuffer += e.key;
            const osd = document.getElementById('osd-number');
            osd.innerText = "CH: " + numBuffer; 
            osd.style.display = 'block';
            clearTimeout(numTimeout);
            numTimeout = setTimeout(() => {
                const targetIdx = parseInt(numBuffer);
                const chData = allChannels[targetIdx - 1];
                if (chData) {
                    const targetCard = document.querySelector(`.card[data-index="${targetIdx}"]`);
                    if(targetCard) targetCard.focus();
                    playChannel(chData, targetCard);
                }
                numBuffer = ""; 
                osd.style.display = 'none';
            }, 1000); 
        }
    });

    init();
</script>
</body>
</html>
