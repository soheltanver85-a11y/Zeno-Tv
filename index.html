<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeno TV - Turbo Fixed</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root { --accent: #ff0000; --bg: #050505; --card: #1a1a1a; --blue: #0088ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }

        /* প্লেয়ার সেকশন */
        #player-wrapper { 
            height: 45vh; width: 100%; background: #000; position: fixed; top: 0; left: 0; z-index: 4000; 
            display: flex; justify-content: center; align-items: center; border-bottom: 3px solid #333;
        }
        .video-js { width: 100% !important; height: 100% !important; }
        
        /* UI লেআউট */
        #ui-overlay { margin-top: 45vh; height: 55vh; display: flex; flex-direction: column; background: var(--bg); }
        
        /* ক্যাটাগরি বার */
        .tabs-container { 
            flex-shrink: 0; display: flex; align-items: center; gap: 12px; 
            padding: 15px 20px; background: #0a0a0a; z-index: 3500;
            border-bottom: 3px solid var(--blue); overflow-x: auto;
        }

        .tab, .apk-btn, .refresh-btn, .custom-fs-btn { 
            padding: 12px 20px; border-radius: 12px; cursor: pointer; background: #222; 
            color: #fff; font-weight: bold; font-size: 14px; border: 2px solid transparent; outline: none;
            white-space: nowrap; transition: 0.2s;
        }

        .custom-fs-btn { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; }

        /* চ্যানেল গ্রিড */
        #scroll-content { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .card { background: var(--card); border-radius: 12px; cursor: pointer; border: 2px solid #333; position: relative; overflow: hidden; transition: 0.3s; }
        .card:focus { border-color: var(--accent); transform: scale(1.05); outline: none; box-shadow: 0 0 15px var(--accent); }
        
        .logo-box { height: 85px; display: flex; align-items: center; justify-content: center; background: #111; padding: 8px; pointer-events: none; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .name { padding: 10px; font-size: 13px; font-weight: bold; text-align: center; color: #ccc; pointer-events: none; }
        .ch-index { position: absolute; top: 5px; left: 5px; background: var(--blue); color: white; font-size: 11px; font-weight: bold; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 5; }

        #osd-number { 
            position: fixed; top: 30px; right: 30px; background: rgba(255, 0, 0, 0.9); 
            color: white; font-size: 40px; font-weight: bold; padding: 10px 25px; 
            border-radius: 10px; display: none; z-index: 99999; border: 2px solid white;
        }
    </style>
</head>
<body>

<div id="osd-number">CH: --</div>

<div id="player-wrapper">
    <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
</div>

<div id="ui-overlay">
    <div class="tabs-container">
        <button class="tab" tabindex="0">সব চ্যানেল</button>
        <button class="refresh-btn" tabindex="0" onclick="forceRefresh()">🔄 রিফ্রেশ</button>
        <button class="custom-fs-btn" tabindex="0" onclick="goFullscreen()">📺 ফুলস্ক্রিন</button>
    </div>

    <div id="scroll-content">
        <div id="channel-grid" class="grid">
            <h3 id="loading-text" style="text-align: center; width: 100%;">চ্যানেল লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</h3>
        </div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const player = videojs('tv-player');
    // আপনার অরিজিনাল মেইন লিঙ্ক
    const rawUrl = 'https://gitlab.com/soheltanver85/m3u-link/-/raw/main/playlist.m3u';
    let allChannels = [];

    async function init() {
        // ১. শুরুতে ক্যাশ থেকে লোড করার চেষ্টা করবে যাতে ইউজার সাথে সাথেই কিছু দেখতে পায়
        const cachedData = localStorage.getItem('zeno_cache');
        if (cachedData) {
            allChannels = JSON.parse(cachedData);
            renderGrid(allChannels);
        }
        
        // ২. সরাসরি সার্ভার থেকে আপডেট ডাটা আনবে
        await fetchChannels();

        // ৩. প্রতি ৩০ সেকেন্ড পর পর আপডেট চেক করবে
        setInterval(fetchChannels, 30000);
    }

    async function fetchChannels() {
        try {
            const cacheBuster = Date.now();
            // AllOrigins ছাড়াও বিকল্প ব্যাকআপ লিঙ্ক ব্যবহার করছি
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rawUrl)}&v=${cacheBuster}`;
            
            const res = await fetch(proxyUrl);
            if (!res.ok) throw new Error('Network response was not ok');
            
            const data = await res.text();
            if (!data || data.length < 50) return; // ডাটা ঠিকমতো না আসলে রিফ্রেশ করবে না

            const lines = data.split('\n');
            let name = "", logo = "";
            let newChannels = [];

            lines.forEach(line => {
                line = line.trim();
                if (line.includes('#EXTINF:')) {
                    const nameMatch = line.split(',');
                    name = nameMatch[nameMatch.length - 1].trim();
                    logo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || "";
                } else if (line.startsWith('http')) {
                    newChannels.push({ name: name || "Unknown", url: line, logo: logo });
                }
            });

            if (newChannels.length > 0) {
                const oldHash = JSON.stringify(allChannels);
                const newHash = JSON.stringify(newChannels);

                if (oldHash !== newHash) {
                    allChannels = newChannels;
                    localStorage.setItem('zeno_cache', newHash);
                    renderGrid(allChannels);
                    console.log("চ্যানেল লিস্ট আপডেট হয়েছে!");
                }
                document.getElementById('loading-text').style.display = 'none';
            }
        } catch (error) {
            console.error("ডাটা লোড করতে সমস্যা হয়েছে:", error);
            // যদি মেইন প্রক্সি ফেইল করে, তবে অল্টারনেটিভ চেষ্টা করা যেতে পারে
        }
    }

    function renderGrid(list) {
        const grid = document.getElementById('channel-grid');
        grid.innerHTML = ''; 
        
        list.forEach((ch, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.tabIndex = 0;
            const originalIdx = index + 1;
            card.setAttribute('data-index', originalIdx);
            
            card.innerHTML = `
                <div class="ch-index">${originalIdx}</div>
                <div class="logo-box"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150?text=TV'"></div>
                <div class="name">${ch.name}</div>
            `;

            card.addEventListener('click', () => playChannel(ch, card));
            grid.appendChild(card);
        });
    }

    function playChannel(ch, cardElement) {
        player.src({ src: ch.url, type: 'application/x-mpegURL' });
        player.play().catch(() => {
            alert("এই চ্যানেলটি বর্তমানে চলছে না।");
        });
        if(cardElement) cardElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function forceRefresh() {
        const btn = document.querySelector('.refresh-btn');
        btn.innerText = "লোডিং...";
        fetchChannels().finally(() => {
            btn.innerText = "🔄 রিফ্রেশ";
        });
    }

    function goFullscreen() {
        if (player.isFullscreen()) player.exitFullscreen();
        else player.requestFullscreen();
    }

    // রিমোট কন্ট্রোল নম্বর লজিক
    let numBuffer = "";
    let numTimeout = null;
    window.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') {
            numBuffer += e.key;
            const osd = document.getElementById('osd-number');
            osd.innerText = "CH: " + numBuffer; 
            osd.style.display = 'block';
            
            clearTimeout(numTimeout);
            numTimeout = setTimeout(() => {
                const targetIdx = parseInt(numBuffer);
                const chData = allChannels[targetIdx - 1];
                if (chData) {
                    const targetCard = document.querySelector(`.card[data-index="${targetIdx}"]`);
                    if(targetCard) targetCard.focus();
                    playChannel(chData, targetCard);
                }
                numBuffer = ""; 
                osd.style.display = 'none';
            }, 1500); 
        }
    });

    // পেজ লোড হলেই রান হবে
    init();
</script>
</body>
</html>
