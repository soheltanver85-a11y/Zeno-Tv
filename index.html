<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeno TV - Turbo Edition</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root { --accent: #ff0000; --bg: #050505; --card: #1a1a1a; --blue: #0088ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }

        /* প্লেয়ার সেকশন */
        #player-wrapper { 
            height: 45vh; width: 100%; background: #000; position: fixed; top: 0; left: 0; z-index: 4000; 
            display: flex; justify-content: center; align-items: center; border-bottom: 3px solid #333;
        }
        .video-js { width: 100% !important; height: 100% !important; }
        
        /* UI লেআউট */
        #ui-overlay { margin-top: 45vh; height: 55vh; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        
        /* ক্যাটাগরি বার */
        .tabs-container { 
            flex-shrink: 0; display: flex; align-items: center; gap: 12px; 
            padding: 15px 20px; background: #0a0a0a; z-index: 3500;
            border-bottom: 3px solid var(--blue); overflow-x: auto;
        }

        .tab, .apk-btn, .refresh-btn, .custom-fs-btn { 
            padding: 14px 26px; border-radius: 12px; cursor: pointer; background: #222; 
            color: #fff; font-weight: bold; font-size: 16px; border: 2px solid transparent; outline: none;
            white-space: nowrap; transition: 0.2s;
        }

        .custom-fs-btn { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; }

        /* ফোকাস স্টাইল */
        .tab:focus, .card:focus, .refresh-btn:focus, .custom-fs-btn:focus { 
            background: var(--accent) !important; border-color: #fff !important; transform: scale(1.05); 
            box-shadow: 0 0 20px var(--accent); z-index: 10; outline: none;
        }

        /* চ্যানেল গ্রিড */
        #scroll-content { 
            flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; padding: 20px; 
            -webkit-overflow-scrolling: touch; 
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        .card { background: var(--card); border-radius: 15px; cursor: pointer; border: 2px solid #333; position: relative; overflow: hidden; }
        .logo-box { height: 95px; display: flex; align-items: center; justify-content: center; background: #111; padding: 10px; pointer-events: none; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .name { padding: 12px; font-size: 14px; font-weight: bold; text-align: center; color: #ccc; pointer-events: none; }
        .ch-index { position: absolute; top: 8px; left: 8px; background: var(--blue); color: white; font-size: 12px; font-weight: bold; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 5; }

        /* OSD নম্বর */
        #osd-number { 
            position: fixed; top: 40px; right: 40px; background: rgba(255, 0, 0, 0.95); 
            color: white; font-size: 55px; font-weight: bold; padding: 15px 35px; 
            border-radius: 15px; display: none; z-index: 99999; border: 3px solid white;
        }

        /* Pull to Refresh ইন্ডিকেটর */
        #ptr-box {
            width: 100%; height: 0; overflow: hidden; background: #111; 
            display: flex; align-items: center; justify-content: center;
            color: var(--blue); font-weight: bold; transition: height 0.2s ease;
        }
    </style>
</head>
<body>

<div id="osd-number">CH: --</div>

<div id="player-wrapper">
    <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
</div>

<div id="ui-overlay">
    <div id="ptr-box">ছেড়ে দিন রিফ্রেশ করতে...</div>
    <div class="tabs-container">
        <button class="tab" tabindex="0">সব চ্যানেল</button>
        <button class="refresh-btn" tabindex="0" onclick="forceRefresh()">🔄 রিফ্রেশ</button>
        <button class="custom-fs-btn" tabindex="0" onclick="goFullscreen()">📺 ফুলস্ক্রিন</button>
        <button class="apk-btn" tabindex="0">📥 APK</button>
    </div>

    <div id="scroll-content">
        <div id="channel-grid" class="grid"></div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const player = videojs('tv-player');
    const rawUrl = 'https://gitlab.com/soheltanver85/m3u-link/-/raw/main/playlist.m3u';
    let allChannels = [];

    async function init() {
        const cachedData = localStorage.getItem('zeno_cache');
        if (cachedData) {
            allChannels = JSON.parse(cachedData);
            renderGrid(allChannels);
        }
        await fetchChannels();
        setInterval(fetchChannels, 20000); // ২০ সেকেন্ড অন্তর অটো আপডেট
    }

    async function fetchChannels() {
        try {
            const token = Date.now();
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rawUrl)}&v=${token}`;
            const res = await fetch(proxyUrl);
            const data = await res.text();
            
            if (!data || data.length < 50) return;

            const lines = data.split('\n');
            let name = "", logo = "";
            let newChannels = [];

            lines.forEach(line => {
                line = line.trim();
                if (line.includes('#EXTINF:')) {
                    const nameParts = line.split(',');
                    name = nameParts[nameParts.length - 1].trim();
                    logo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || "";
                } else if (line.startsWith('http')) {
                    newChannels.push({ name: name || "Channel", url: line, logo: logo });
                }
            });

            if (newChannels.length > 0) {
                const oldHash = JSON.stringify(allChannels);
                const newHash = JSON.stringify(newChannels);
                if (oldHash !== newHash) {
                    allChannels = newChannels;
                    localStorage.setItem('zeno_cache', newHash);
                    renderGrid(allChannels);
                }
            }
        } catch(e) { console.log("Fetch Error"); }
    }

    function renderGrid(list) {
        const grid = document.getElementById('channel-grid');
        grid.innerHTML = '';
        list.forEach((ch, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.tabIndex = 0;
            card.setAttribute('data-index', index + 1);
            card.innerHTML = `
                <div class="ch-index">${index + 1}</div>
                <div class="logo-box"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150?text=TV'"></div>
                <div class="name">${ch.name}</div>
            `;
            card.onclick = () => playChannel(ch, card);
            grid.appendChild(card);
        });
    }

    function playChannel(ch, card) {
        player.src({ src: ch.url, type: 'application/x-mpegURL' });
        player.play().catch(()=>{});
        if(card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function forceRefresh() {
        localStorage.removeItem('zeno_cache');
        fetchChannels();
    }

    function goFullscreen() {
        if (player.isFullscreen()) player.exitFullscreen();
        else player.requestFullscreen();
    }

    // --- Pull to Refresh logic (সংশোধিত) ---
    const scroller = document.getElementById('scroll-content');
    const ptrBox = document.getElementById('ptr-box');
    let touchStart = 0;

    scroller.addEventListener('touchstart', (e) => {
        touchStart = e.touches[0].pageY;
    }, {passive: true});

    scroller.addEventListener('touchmove', (e) => {
        const touchCurrent = e.touches[0].pageY;
        const diff = touchCurrent - touchStart;
        
        if (scroller.scrollTop <= 0 && diff > 0) {
            ptrBox.style.height = Math.min(diff / 2, 60) + 'px';
        }
    }, {passive: true});

    scroller.addEventListener('touchend', async (e) => {
        if (parseInt(ptrBox.style.height) >= 50) {
            ptrBox.innerText = "🔄 আপডেট হচ্ছে...";
            await fetchChannels();
            setTimeout(() => { 
                ptrBox.style.height = '0px'; 
                ptrBox.innerText = "ছেড়ে দিন রিফ্রেশ করতে..."; 
            }, 500);
        } else {
            ptrBox.style.height = '0px';
        }
    });

    // --- রিমোট নম্বর কন্ট্রোল ---
    let numBuffer = "", numTimeout = null;
    window.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') {
            numBuffer += e.key;
            const osd = document.getElementById('osd-number');
            osd.innerText = "CH: " + numBuffer; 
            osd.style.display = 'block';
            clearTimeout(numTimeout);
            numTimeout = setTimeout(() => {
                const targetIdx = parseInt(numBuffer);
                const chData = allChannels[targetIdx - 1];
                if (chData) {
                    const targetCard = document.querySelector(`.card[data-index="${targetIdx}"]`);
                    if(targetCard) targetCard.focus();
                    playChannel(chData, targetCard);
                }
                numBuffer = ""; osd.style.display = 'none';
            }, 2000); 
        }
    });

    init();
</script>
</body>
</html>
