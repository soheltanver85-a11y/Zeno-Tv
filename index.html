<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeno TV - Fix Edition</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { --bg: #050505; --card: #1a1a1a; --blue: #0088ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }

        #player-wrapper { height: 45vh; width: 100%; background: #000; position: fixed; top: 0; left: 0; z-index: 4000; border-bottom: 3px solid #333; display: flex; justify-content: center; }
        .video-js { width: 100% !important; height: 100% !important; }
        
        #ui-overlay { margin-top: 45vh; height: 55vh; display: flex; flex-direction: column; }
        
        .tabs-container { padding: 15px 25px; background: #0a0a0a; display: flex; gap: 15px; align-items: center; border-bottom: 2px solid #222; overflow-x: auto; }

        .refresh-btn { background: linear-gradient(135deg, #0088ff, #0055ff); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; display: flex; gap: 10px; align-items: center; }
        .refresh-btn:focus { transform: scale(1.1); outline: 3px solid white; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 25px; }
        .card { background: var(--card); border-radius: 15px; cursor: pointer; border: 3px solid #222; overflow: hidden; transition: 0.3s; position: relative; }
        .card:focus { border-color: var(--blue); transform: scale(1.05); outline: none; }
        
        .logo-box { height: 110px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .name { padding: 10px; text-align: center; font-weight: bold; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ch-index { position: absolute; top: 5px; left: 5px; background: var(--blue); padding: 3px 8px; border-radius: 10px; font-size: 12px; z-index: 10; }

        #osd-number { position: fixed; top: 20px; right: 20px; background: red; padding: 10px 20px; font-size: 40px; border-radius: 10px; display: none; z-index: 10000; }
        #scroll-content { overflow-y: auto; flex-grow: 1; }
        
        .loading-text { text-align: center; font-size: 20px; color: var(--blue); margin-top: 50px; }
    </style>
</head>
<body>

<div id="osd-number">CH: --</div>

<div id="player-wrapper">
    <video id="tv-player" class="video-js vjs-default-skin" controls preload="auto" playsinline></video>
</div>

<div id="ui-overlay">
    <div class="tabs-container">
        <button class="refresh-btn" onclick="location.reload()" tabindex="0">
            <i class="fa-solid fa-rotate"></i> রিফ্রেশ করুন
        </button>
        <input type="text" id="search-input" placeholder="সার্চ করুন..." style="padding:12px; border-radius:50px; border:none; flex-grow:1;" tabindex="0">
    </div>

    <div id="scroll-content">
        <div id="channel-grid" class="grid">
            <div class="loading-text">চ্যানেল লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</div>
        </div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const player = videojs('tv-player');
    // বিকল্প প্রক্সি ব্যবহার করা হয়েছে (যদি AllOrigins কাজ না করে)
    const m3uUrl = 'https://api.codetabs.com/v1/proxy?quest=https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv2/refs/heads/main/Live-tv2';

    let allChannels = [];

    async function init() {
        // ১. আগে ক্যাশ থেকে দেখাবে (যদি থাকে)
        const cached = localStorage.getItem('zeno_tv_cache');
        if (cached) {
            allChannels = JSON.parse(cached);
            renderGrid(allChannels);
        }
        
        // ২. ইন্টারনেট থেকে নতুন ডাটা আনবে
        await fetchChannels();
    }

    async function fetchChannels() {
        try {
            const res = await fetch(m3uUrl);
            const data = await res.text();
            
            if (!data || data.trim() === "") throw new Error("No data");

            const lines = data.split('\n');
            let name = "", logo = "", newChannels = [];

            lines.forEach(line => {
                if (line.includes('#EXTINF:')) {
                    name = line.split(',').pop().trim();
                    logo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || "";
                } else if (line.startsWith('http')) {
                    newChannels.push({ name, url: line.trim(), logo });
                }
            });

            if (newChannels.length > 0) {
                allChannels = newChannels;
                localStorage.setItem('zeno_tv_cache', JSON.stringify(allChannels));
                renderGrid(allChannels);
            }
        } catch (e) {
            console.error("Fetch Error:", e);
            if(allChannels.length === 0) {
                document.getElementById('channel-grid').innerHTML = '<h2 style="text-align:center; width:100%;">চ্যানেল লোড করা সম্ভব হচ্ছে না। ইন্টারনেট বা প্রক্সি সমস্যা।</h2>';
            }
        }
    }

    function renderGrid(list) {
        const grid = document.getElementById('channel-grid');
        grid.innerHTML = '';
        list.forEach((ch, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.tabIndex = 0;
            card.setAttribute('data-index', i + 1);
            card.innerHTML = `
                <div class="ch-index">${i + 1}</div>
                <div class="logo-box"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150?text=TV'"></div>
                <div class="name">${ch.name}</div>`;
            card.onclick = () => {
                player.src({ src: ch.url, type: 'application/x-mpegURL' });
                player.play();
            };
            grid.appendChild(card);
        });
    }

    // সার্চ ফিল্টার
    document.getElementById('search-input').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        renderGrid(allChannels.filter(c => c.name.toLowerCase().includes(term)));
    };

    init();
</script>
</body>
</html>
