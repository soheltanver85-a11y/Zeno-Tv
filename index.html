<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeno TV - Turbo Edition</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root { --accent: #ff0000; --bg: #050505; --card: #1a1a1a; --blue: #0088ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }

        #player-wrapper { 
            height: 45vh; width: 100%; background: #000; position: fixed; top: 0; left: 0; z-index: 4000; 
            display: flex; justify-content: center; align-items: center; border-bottom: 3px solid #333;
        }
        .video-js { width: 100% !important; height: 100% !important; }
        
        /* স্থির কোলনসহ প্রিমিয়াম লাল নিয়ন ঘড়ির স্টাইল */
        .zeno-clock {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #ff0000; /* সম্পূর্ণ লাল টেক্সট */
            padding: 10px 24px;
            border-radius: 35px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 28px; 
            font-weight: 900; 
            letter-spacing: 2px;
            border: 2px solid rgba(255, 0, 0, 0.4); 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6), inset 0 0 10px rgba(255, 0, 0, 0.2);
            z-index: 5000; 
            pointer-events: none; 
            display: flex;
            align-items: center;
            gap: 5px;
            text-shadow: 0 0 12px rgba(255, 0, 0, 0.8); 
        }
        
        /* ঘড়ির ভেতরের এএম/পিএম টেক্সট */
        .zeno-clock .ampm {
            font-size: 16px;
            color: #ffa500; 
            margin-left: 8px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 165, 0, 0.6);
        }

        /* কোলন চিহ্নটি এখন একদম স্থির থাকবে, কোনো অ্যানিমেশন নেই */
        .zeno-clock .fixed-colon {
            opacity: 1;
        }
        
        #ui-overlay { margin-top: 45vh; height: 55vh; display: flex; flex-direction: column; background: var(--bg); }
        
        .tabs-container { 
            flex-shrink: 0; display: flex; align-items: center; gap: 12px; 
            padding: 15px 20px; background: #0a0a0a; z-index: 3500;
            border-bottom: 3px solid var(--blue); overflow-x: auto;
        }

        .tab, .apk-btn, .refresh-btn, .custom-fs-btn { 
            padding: 14px 26px; border-radius: 12px; cursor: pointer; background: #222; 
            color: #fff; font-weight: bold; font-size: 16px; border: 2px solid transparent; outline: none;
            white-space: nowrap; transition: 0.2s;
        }

        .tab.active { background: var(--blue); color: white; }

        #search-input {
            flex-grow: 1; min-width: 300px; padding: 14px 20px; border-radius: 12px; 
            border: 2px solid #333; background: #111; color: #fff; font-size: 16px; 
            outline: none; transition: 0.3s;
        }

        /* অ্যান্ড্রয়েড টিভি রিমোটের ফোকাস ইফেক্ট */
        .tab:focus, .card:focus, .refresh-btn:focus, .custom-fs-btn:focus, .apk-btn:focus, #search-input:focus { 
            border-color: #fff !important; 
            transform: scale(1.06); 
            outline: none; 
            box-shadow: 0 0 25px var(--blue); 
            background: #252525 !important;
            z-index: 10;
        }

        #scroll-content { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; padding: 20px; }
        
        /* ফিক্সড গ্রিড কলাম */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
        }
        
        .card { background: var(--card); border-radius: 15px; cursor: pointer; border: 2px solid #333; position: relative; overflow: hidden; transition: 0.2s; }
        .logo-box { height: 95px; display: flex; align-items: center; justify-content: center; background: #111; padding: 10px; pointer-events: none; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .name { padding: 12px; font-size: 14px; font-weight: bold; text-align: center; color: #ccc; pointer-events: none; }
        
        /* ফেভারিট হার্ট আইকন */
        .card.is-fav::after {
            content: '❤️';
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 18px;
            text-shadow: 0 0 5px black;
        }

        .ch-index { position: absolute; top: 8px; left: 8px; background: var(--blue); color: white; font-size: 12px; font-weight: bold; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 5; }

        /* উন্নত অন-স্ক্রিন ডিসপ্লে (OSD) */
        #osd-msg { 
            position: fixed; bottom: 60vh; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: white; font-size: 28px; font-weight: bold; 
            padding: 18px 45px; border-radius: 30px; display: none; z-index: 99999; 
            border: 3px solid var(--blue); text-align: center; pointer-events: none;
            box-shadow: 0 0 30px rgba(0, 136, 255, 0.5);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="osd-msg"></div>

<div id="player-wrapper">
    <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
    <!-- স্থির কোলনসহ লাইভ ঘড়ি -->
    <div id="live-clock" class="zeno-clock">00<span class="fixed-colon">:</span>00 <span class="ampm">AM</span></div>
</div>

<div id="ui-overlay">
    <div class="tabs-container">
        <button class="tab nav-item active" id="btn-all" onclick="showCategory('all')">সব চ্যানেল</button>
        <button class="tab nav-item" id="btn-fav" onclick="showCategory('fav')">❤️ প্রিয় তালিকা</button>
        <button class="refresh-btn nav-item" onclick="forceRefresh()">🔄 রিফ্রেশ</button>
        <button class="custom-fs-btn nav-item" onclick="goFullscreen()">📺 ফুলস্ক্রিন</button>
        <button class="apk-btn nav-item" onclick="downloadAPK()">📥 APK</button>
        <input type="text" id="search-input" class="nav-item" placeholder="🔍 সার্চ করুন..." readonly>
    </div>

    <div id="scroll-content">
        <div id="channel-grid" class="grid"></div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const player = videojs('tv-player');
    const m3uUrl = 'https://raw.githubusercontent.com/soheltanver85-a11y/Live-tv/refs/heads/main/Live%20tv';
    const apkDownloadUrl = 'https://www.mediafire.com/file/yvksk56pmlwx9m9/Zeno_Tv.apk/file';

    let allChannels = [];
    let favChannels = JSON.parse(localStorage.getItem('zeno_favs')) || [];
    let currentView = 'all';
    let numBuffer = "";
    let osdTimeout;
    let lastPlayedUrl = "";

    // বাংলাদেশ টাইম অনুযায়ী ঘড়ি আপডেট করার জন্য ফাংশন
    function updateBangladeshClock() {
        const clockEl = document.getElementById('live-clock');
        if (!clockEl) return;

        const bdTime = new Date().toLocaleString("en-US", {timeZone: "Asia/Dhaka"});
        const date = new Date(bdTime);
        
        let hours = date.getHours();
        let minutes = date.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        
        hours = hours % 12;
        hours = hours ? hours : 12; 
        
        hours = hours < 10 ? '0' + hours : hours;
        minutes = minutes < 10 ? '0' + minutes : minutes;
        
        // এখানে কোলনের ক্লাস পরিবর্তন করে fixed-colon করা হয়েছে যাতে এটি স্থির থাকে
        clockEl.innerHTML = `${hours}<span class="fixed-colon">:</span>${minutes}<span class="ampm">${ampm}</span>`;
    }
    setInterval(updateBangladeshClock, 1000);

    async function init() {
        updateBangladeshClock(); 
        const cachedData = localStorage.getItem('zeno_cache');
        if (cachedData) {
            allChannels = JSON.parse(cachedData);
            renderGrid(allChannels); 
        }
        await fetchChannels(); 
    }

    async function fetchChannels() {
        try {
            const res = await fetch(m3uUrl);
            const data = await res.text();
            const lines = data.split('\n');
            let name = "", logo = "";
            let newChannels = [];

            lines.forEach(line => {
                line = line.trim();
                if (line.includes('#EXTINF:')) {
                    const nameParts = line.split(',');
                    name = nameParts[nameParts.length - 1].trim();
                    logo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || "";
                } else if (line.startsWith('http')) {
                    newChannels.push({ name: name || "Channel", url: line, logo });
                }
            });

            if (newChannels.length > 0) {
                allChannels = newChannels;
                localStorage.setItem('zeno_cache', JSON.stringify(allChannels));
                if(currentView === 'all') renderGrid(allChannels);
            }
        } catch(e) { console.error("Fetch error:", e); }
    }

    function renderGrid(list) {
        const grid = document.getElementById('channel-grid');
        grid.innerHTML = '';
        
        list.forEach((ch, index) => {
            const isFavorite = favChannels.some(f => f.url === ch.url);
            const card = document.createElement('div');
            card.className = `card nav-item ${isFavorite ? 'is-fav' : ''}`;
            card.tabIndex = 0;
            
            const originalIdx = allChannels.findIndex(c => c.url === ch.url) + 1;
            card.setAttribute('data-index', originalIdx);
            card.setAttribute('data-url', ch.url);
            
            card.innerHTML = `<div class="ch-index">${originalIdx}</div>
                              <div class="logo-box"><img src="${ch.logo}" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=TV'"></div>
                              <div class="name">${ch.name}</div>`;

            let clickTimer;
            card.addEventListener('click', () => {
                if (clickTimer) {
                    clearTimeout(clickTimer);
                    clickTimer = null;
                    goFullscreen();
                } else {
                    clickTimer = setTimeout(() => {
                        playChannel(ch, card);
                        clickTimer = null;
                    }, 250);
                }
            });

            grid.appendChild(card);
        });

        focusLastOrFirstChannel();
    }

    function focusLastOrFirstChannel() {
        if (lastPlayedUrl) {
            const targetCard = document.querySelector(`.card[data-url="${lastPlayedUrl}"]`);
            if (targetCard) {
                targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                targetCard.focus();
                return;
            }
        }
        const firstCard = document.querySelector('#channel-grid .card');
        if (firstCard) firstCard.focus();
    }

    function toggleFavorite(ch, card) {
        const index = favChannels.findIndex(f => f.url === ch.url);
        if (index === -1) {
            favChannels.push(ch);
            if(card) card.classList.add('is-fav');
            showOSD(`❤️ ${ch.name} প্রিয় তালিকায় যুক্ত হলো`);
        } else {
            favChannels.splice(index, 1);
            if(card) card.classList.remove('is-fav');
            showOSD(`💔 প্রিয় তালিকা থেকে বাদ দেওয়া হলো`);
            if(currentView === 'fav') renderGrid(favChannels);
        }
        localStorage.setItem('zeno_favs', JSON.stringify(favChannels));
    }

    function playChannel(ch, card) {
        lastPlayedUrl = ch.url;
        player.src({ src: ch.url, type: 'application/x-mpegURL' });
        player.play().catch(()=>{});
        showOSD(`📺 এখন দেখছেন: ${ch.name}`);
        
        if(card) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.focus();
        }
    }

    function showCategory(type) {
        currentView = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(type === 'all') {
            document.getElementById('btn-all').classList.add('active');
            renderGrid(allChannels);
        } else {
            document.getElementById('btn-fav').classList.add('active');
            renderGrid(favChannels);
        }
    }

    function showOSD(msg) {
        const osd = document.getElementById('osd-msg');
        osd.innerText = msg;
        osd.style.display = 'block';
        clearTimeout(osdTimeout);
        osdTimeout = setTimeout(() => osd.style.display = 'none', 3000);
    }

    function handleNumberKey(key) {
        const searchInput = document.getElementById('search-input');
        if (document.activeElement === searchInput && !searchInput.readOnly) return;
        
        numBuffer += key;
        showOSD(`🔢 চ্যানেল নম্বর: ${numBuffer}`);
        
        clearTimeout(osdTimeout);
        osdTimeout = setTimeout(() => {
            const targetIdx = parseInt(numBuffer);
            const chData = allChannels[targetIdx - 1];
            if (chData) {
                const targetCard = document.querySelector(`.card[data-index="${targetIdx}"]`);
                if (player.isFullscreen()) player.exitFullscreen();
                playChannel(chData, targetCard);
            } else {
                showOSD("❌ এই নম্বরে কোনো চ্যানেল নেই!");
            }
            numBuffer = ""; 
        }, 1800);
    }

    function goFullscreen() {
        if (player.isFullscreen()) player.exitFullscreen();
        else player.requestFullscreen();
    }

    // ফুলস্ক্রিন চেঞ্জ হ্যান্ডলার
    player.on('fullscreenchange', () => {
        const clock = document.getElementById('live-clock');
        if (player.isFullscreen()) {
            player.el().appendChild(clock);
        } else {
            document.getElementById('player-wrapper').appendChild(clock);
            setTimeout(focusLastOrFirstChannel, 200);
        }
    });

    function forceRefresh() {
        localStorage.removeItem('zeno_cache');
        location.reload();
    }

    function downloadAPK() { window.open(apkDownloadUrl, '_blank'); }

    // কি-বোর্ড নেভিগেশন ইঞ্জিন
    window.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') {
            handleNumberKey(e.key);
            return;
        }

        const active = document.activeElement;

        if (e.key === 'MediaPlayPause' || e.keyCode === 179 || e.keyCode === 85) {
            let targetCard = active;
            if (!targetCard || !targetCard.classList.contains('card')) {
                targetCard = document.querySelector(`.card[data-url="${lastPlayedUrl}"]`);
            }
            if (targetCard) {
                const url = targetCard.getAttribute('data-url');
                const chData = allChannels.find(c => c.url === url);
                if (chData) {
                    toggleFavorite(chData, targetCard);
                    e.preventDefault();
                }
            }
            return;
        }

        if (e.key === 'Back' || e.key === 'Escape' || e.keyCode === 8) {
            if (player.isFullscreen()) {
                player.exitFullscreen();
                e.preventDefault();
            }
            focusLastOrFirstChannel();
            return;
        }

        if (!active) return;

        const menuItems = Array.from(document.querySelectorAll('.tabs-container .nav-item'));
        const grid = document.getElementById('channel-grid');
        const cards = Array.from(grid.querySelectorAll('.card'));
        
        const isMenu = menuItems.includes(active);
        const isCard = cards.includes(active);

        if (!isMenu && !isCard) return;

        let columns = 1;
        if (cards.length > 0) {
            const firstCardTop = cards[0].getBoundingClientRect().top;
            columns = cards.filter(c => c.getBoundingClientRect().top === firstCardTop).length || 1;
        }

        if (isMenu) {
            const idx = menuItems.indexOf(active);
            if (e.key === 'ArrowRight' && idx < menuItems.length - 1) {
                menuItems[idx + 1].focus();
                e.preventDefault();
            } else if (e.key === 'ArrowLeft' && idx > 0) {
                menuItems[idx - 1].focus();
                e.preventDefault();
            } else if (e.key === 'ArrowDown') {
                const lastCard = document.querySelector(`.card[data-url="${lastPlayedUrl}"]`);
                if (lastCard) lastCard.focus();
                else if (cards.length > 0) cards[0].focus();
                e.preventDefault();
            }
        } 
        
        else if (isCard) {
            const idx = cards.indexOf(active);

            switch (e.key) {
                case 'ArrowRight':
                    if (idx < cards.length - 1) {
                        cards[idx + 1].focus();
                        cards[idx + 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    e.preventDefault();
                    break;
                    
                case 'ArrowLeft':
                    if (idx > 0) {
                        cards[idx - 1].focus();
                        cards[idx - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    e.preventDefault();
                    break;
                    
                case 'ArrowDown':
                    if (idx + columns < cards.length) {
                        cards[idx + columns].focus();
                        cards[idx + columns].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    e.preventDefault();
                    break;
                    
                case 'ArrowUp':
                    if (idx - columns >= 0) {
                        cards[idx - columns].focus();
                        cards[idx - columns].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        if (menuItems.length > 0) menuItems[0].focus();
                    }
                    e.preventDefault();
                    break;
            }
        }
    });

    init();
</script>
</body>
</html>
