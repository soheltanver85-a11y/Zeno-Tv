<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeno TV - Turbo Edition</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root { --accent: #ff0000; --bg: #050505; --card: #1a1a1a; --blue: #0088ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }

        /* প্লেয়ার সেকশন */
        #player-wrapper { 
            height: 45vh; width: 100%; background: #000; position: fixed; top: 0; left: 0; z-index: 4000; 
            display: flex; justify-content: center; align-items: center; border-bottom: 3px solid #333;
        }
        .video-js { width: 100% !important; height: 100% !important; }
        
        /* UI লেআউট */
        #ui-overlay { margin-top: 45vh; height: 55vh; display: flex; flex-direction: column; background: var(--bg); }
        
        /* ক্যাটাগরি বার ও সার্চ বক্স */
        .tabs-container { 
            flex-shrink: 0; display: flex; align-items: center; gap: 12px; 
            padding: 15px 20px; background: #0a0a0a; z-index: 3500;
            border-bottom: 3px solid var(--blue); overflow-x: auto;
        }

        .tab, .apk-btn, .refresh-btn, .custom-fs-btn { 
            padding: 14px 26px; border-radius: 12px; cursor: pointer; background: #222; 
            color: #fff; font-weight: bold; font-size: 16px; border: 2px solid transparent; outline: none;
            white-space: nowrap; transition: 0.2s;
        }

        #search-input {
            flex-grow: 1; min-width: 250px; padding: 14px 20px; border-radius: 12px; 
            border: 2px solid #333; background: #111; color: #fff; font-size: 16px; 
            outline: none; transition: 0.3s;
        }
        #search-input:focus { border-color: var(--blue); background: #1a1a1a; }

        .custom-fs-btn { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; }

        /* চ্যানেল গ্রিড */
        #scroll-content { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        
        .card { background: var(--card); border-radius: 12px; cursor: pointer; border: 2px solid #333; position: relative; overflow: hidden; transition: 0.2s; }
        .card:focus { border-color: #fff; transform: scale(1.05); outline: none; z-index: 10; }
        
        .logo-box { height: 85px; display: flex; align-items: center; justify-content: center; background: #111; padding: 10px; pointer-events: none; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .name { padding: 10px; font-size: 13px; font-weight: bold; text-align: center; color: #eee; pointer-events: none; }
        .ch-index { position: absolute; top: 5px; left: 5px; background: var(--blue); color: white; font-size: 11px; font-weight: bold; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 5; }

        #osd-number { 
            position: fixed; top: 40px; right: 40px; background: rgba(255, 0, 0, 0.95); 
            color: white; font-size: 55px; font-weight: bold; padding: 15px 35px; 
            border-radius: 15px; display: none; z-index: 99999; border: 3px solid white;
        }
    </style>
</head>
<body>

<div id="osd-number">CH: --</div>

<div id="player-wrapper">
    <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
</div>

<div id="ui-overlay">
    <div class="tabs-container">
        <button class="tab" onclick="renderGrid(allChannels)">সব চ্যানেল</button>
        <button class="refresh-btn" onclick="forceRefresh()">🔄 রিফ্রেশ</button>
        <button class="custom-fs-btn" onclick="goFullscreen()">📺 ফুলস্ক্রিন</button>
        <input type="text" id="search-input" placeholder="🔍 চ্যানেল খুঁজুন...">
    </div>

    <div id="scroll-content">
        <div id="channel-grid" class="grid"></div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const player = videojs('tv-player');
    const rawUrl = 'https://gitlab.com/soheltanver85/m3u-link/-/raw/main/playlist.m3u';
    // দ্রুত প্রক্সি ব্যবহার
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(rawUrl);

    let allChannels = [];

    // ১. শুরুতে ক্যাশ থেকে লোড করা
    async function init() {
        const cachedData = localStorage.getItem('zeno_cache');
        if (cachedData) {
            allChannels = JSON.parse(cachedData);
            renderGrid(allChannels);
        }
        // ব্যাকগ্রাউন্ডে ডাটা আপডেট চেক করবে (ইউজারকে বিরক্ত না করে)
        fetchChannels(false);
    }

    // ২. চ্যানেল ডেটা আনা
    async function fetchChannels(isManual = false) {
        try {
            // ক্যাশ এড়াতে টাইমস্ট্যাম্প যোগ
            const response = await fetch(`${proxyUrl}&t=${Date.now()}`);
            if (!response.ok) throw new Error('Network Error');
            
            const data = await response.text();
            const lines = data.split('\n');
            let newChannels = [];
            let currentName = "", currentLogo = "";

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    currentName = line.split(',').pop().trim();
                    currentLogo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || "";
                } else if (line.startsWith('http')) {
                    newChannels.push({ name: currentName || "Unknown", url: line, logo: currentLogo });
                }
            });

            if (newChannels.length > 0) {
                allChannels = newChannels;
                localStorage.setItem('zeno_cache', JSON.stringify(allChannels));
                
                // যদি সার্চ ইনপুট খালি থাকে তবে গ্রিড আপডেট করো
                if (!document.getElementById('search-input').value) {
                    renderGrid(allChannels);
                }
            }
        } catch (e) {
            console.error("Fetch failed:", e);
            if(isManual) alert("সার্ভার থেকে ডেটা পাওয়া যায়নি!");
        }
    }

    // ৩. রিফ্রেশ বাটন লজিক (দ্রুত ফিডব্যাক)
    async function forceRefresh() {
        const btn = document.querySelector('.refresh-btn');
        const grid = document.getElementById('channel-grid');
        
        btn.innerText = "⏳ লোড হচ্ছে...";
        btn.disabled = true;

        // ডেটা আসার আগ পর্যন্ত পুরনো ডেটা দেখাবে যাতে স্ক্রিন ফাঁকা না লাগে
        await fetchChannels(true);
        
        btn.innerText = "🔄 রিফ্রেশ";
        btn.disabled = false;
    }

    // ৪. গ্রিড রেন্ডারিং
    function renderGrid(list) {
        const grid = document.getElementById('channel-grid');
        grid.innerHTML = '';
        
        if (list.length === 0) {
            grid.innerHTML = '<p style="text-align:center; width:100%;">চ্যানেল পাওয়া যায়নি!</p>';
            return;
        }

        // ফ্র্যাগমেন্ট ব্যবহার করা হয়েছে দ্রুত রেন্ডারিংয়ের জন্য
        const fragment = document.createDocumentFragment();
        list.forEach((ch, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.tabIndex = 0;
            card.setAttribute('data-index', index + 1);
            
            card.innerHTML = `
                <div class="ch-index">${index + 1}</div>
                <div class="logo-box"><img src="${ch.logo}" loading="lazy" onerror="this.src='https://via.placeholder.com/100?text=TV'"></div>
                <div class="name">${ch.name}</div>
            `;

            card.onclick = () => playChannel(ch.url);
            fragment.appendChild(card);
        });
        grid.appendChild(fragment);
    }

    function playChannel(url) {
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play().catch(() => {});
    }

    // ৫. সার্চ লজিক
    document.getElementById('search-input').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(term));
        renderGrid(filtered);
    });

    function goFullscreen() {
        if (!player.isFullscreen()) player.requestFullscreen();
        else player.exitFullscreen();
    }

    // নম্বর দিয়ে চ্যানেল বদলানোর লজিক
    let numBuffer = "";
    let numTimeout;
    window.addEventListener('keydown', (e) => {
        if (document.activeElement.id === 'search-input') return;
        if (e.key >= '0' && e.key <= '9') {
            numBuffer += e.key;
            const osd = document.getElementById('osd-number');
            osd.innerText = "CH: " + numBuffer;
            osd.style.display = 'block';
            
            clearTimeout(numTimeout);
            numTimeout = setTimeout(() => {
                const idx = parseInt(numBuffer) - 1;
                if (allChannels[idx]) {
                    playChannel(allChannels[idx].url);
                    const card = document.querySelector(`.card[data-index="${idx + 1}"]`);
                    if (card) card.focus();
                }
                numBuffer = "";
                osd.style.display = 'none';
            }, 1500);
        }
    });

    init();
</script>
</body>
</html>
